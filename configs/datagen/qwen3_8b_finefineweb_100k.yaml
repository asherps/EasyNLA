# NLA datagen — 100k-doc example config (Qwen3-8B, layer 24).
# Gold explanations from Sonnet 4.6 (concurrent Anthropic API).
# Edit output_dir + corpus.name for your setup; corpus.name can be an HF text
# dataset id or a local .parquet with a text column.

model: qwen3_8b
layer_index: 24
output_dir: /data/nla/qwen3_8b_finefineweb_100k

corpus:
  name: m-a-p/FineFineWeb          # or a local .parquet path
  config: null
  split: train
  text_column: text
  start: 0
  length: 100000

stage0:
  positions_per_doc: 10
  chunk_size: 256
  seed: 42
  multigpu: false

stage1:
  av_sft_frac: 0.25
  ar_sft_frac: 0.25
  rl_frac: 0.50
  seed: 42

stage2:
  # Concurrent provider (was BatchAnthropicProvider; batch latency was poor — one
  # sub-batch stuck >9h). 200 streaming calls, same teacher (Sonnet 4.6); high
  # max_retries rides rate-limit storms. ~250k calls (halved data) -> ~2-3h.
  provider_cls: nla.datagen.providers.AnthropicProvider
  provider_kwargs:
    model: claude-sonnet-4-6
    max_tokens: 300
    temperature: 1.0
    concurrency: 200
    max_retries: 100
  chunk_size: 50000

stage3:
  keep_debug_metadata: true

shuffle:
  enabled: true
  seed: 42

storage_cls: nla.datagen.storage.LocalStorage
