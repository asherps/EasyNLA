# NLA RL, single-GPU 4-bit HF rollouts (nla.train_rl_self_contained).
# The simple path: one GPU, 4-bit QLoRA, no checkpoint merge and no vllm-lens patch.
# Slower than the vLLM path but the easiest way to get an NLA training end-to-end.
# Defaults are shared with the vLLM path (NB: this path's critic is a 4-bit
# LoRA-AR rather than a full fine-tune, so if you sweep, sweep here separately).

evals: [base_fve, text_judges]   # see rl_vllm.yaml; text_judges needs ANTHROPIC_API_KEY
train_critic: true
critic_lr: 8.0e-5        # matches the vLLM path (shared default)

# --- optimization ---
lr: 1.0e-4               # matches the vLLM path (shared default)
num_steps: 400
batch_prompts: 64
group_size: 8
max_new_tokens: 256
length_penalty: 0.01       # hinged past cap-64 (see rl_vllm.yaml)
temperature: 1.0
# kl_beta: unset => estimator-conditional default (k3 [DEFAULT]: 0.01, dist: 0.2)
logp_micro_batch: 2
critic_micro_batch: 4

# --- LoRA (AV) ---
lora_r: 128
lora_alpha: 16
use_rslora: true

# --- eval / logging ---
eval_every: 10
eval_n_prompts: 128
save_every: 100
wandb_project: nla
wandb_name: rl_sgpu
